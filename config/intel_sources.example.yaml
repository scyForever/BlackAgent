# Example multi-platform source catalog. Use with POST /api/v1/sources/collect/batch
# after confirming legal basis, robots/terms, and rate limits. These URLs are
# placeholders for operator-owned exports / mirrors / authorized gateways.
# Do not commit secrets.

sources:
  - source_name: tieba_public_monitor
    source_type: Social
    platform: tieba
    source_url: https://tieba.example/export/public-risk-posts.html
    legal_basis: PUBLIC_COMPLIANT_DATA
    feed_format: html
    allowed_domain: tieba.example
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 6

  - source_name: short_video_partner_feed
    source_type: Social
    platform: short_video
    source_url: https://video.partner.example/api/intel/comments.jsonl
    legal_basis: AUTHORIZED_PARTNER
    feed_format: jsonl
    allowed_domain: video.partner.example
    text_fields: [caption, text, comment]
    headers:
      Authorization: Bearer ${BLACKAGENT_SHORT_VIDEO_TOKEN}
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 12

  - source_name: seeding_note_authorized_feed
    source_type: Social
    platform: seeding_community
    source_url: https://notes.partner.example/api/risk-notes.json
    legal_basis: AUTHORIZED_PARTNER
    feed_format: json
    allowed_domain: notes.partner.example
    text_fields: [title, description, note_text]
    headers:
      Authorization: Bearer ${BLACKAGENT_SEEDING_TOKEN}
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 10

  - source_name: crowdsourcing_board_public_export
    source_type: Vertical
    platform: crowdsourcing
    source_url: https://crowd.example/export/tasks.csv
    legal_basis: PUBLIC_COMPLIANT_DATA
    feed_format: csv
    allowed_domain: crowd.example
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 4

  - source_name: second_hand_listing_feed
    source_type: Vertical
    platform: second_hand_market
    source_url: https://resale.example/api/listings.json
    legal_basis: PUBLIC_COMPLIANT_DATA
    feed_format: json
    allowed_domain: resale.example
    text_fields: [title, description, content_text]
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 6

  - source_name: darkweb_gateway_feed
    source_type: Vertical
    platform: darkweb_gateway
    source_url: https://darkweb-gateway.partner.example/exports/market-watch.jsonl
    legal_basis: AUTHORIZED_PARTNER
    feed_format: jsonl
    allowed_domain: darkweb-gateway.partner.example
    text_fields: [title, body, content_text]
    headers:
      Authorization: Bearer ${BLACKAGENT_DARKWEB_TOKEN}
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 3

  - source_name: tech_forum_public_monitor
    source_type: Forum
    platform: technical_community
    source_url: https://forum.example/security/watch.html
    legal_basis: PUBLIC_COMPLIANT_DATA
    feed_format: html
    allowed_domain: forum.example
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 5

  - source_name: x_authorized_stream
    source_type: IM
    platform: x
    source_url: https://x.partner.example/exports/keywords.json
    legal_basis: AUTHORIZED_PARTNER
    feed_format: json
    allowed_domain: x.partner.example
    text_fields: [full_text, text, content_text]
    headers:
      Authorization: Bearer ${BLACKAGENT_X_TOKEN}
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 15

  - source_name: telegram_group_partner_export
    source_type: IM
    platform: telegram
    source_url: https://telegram.partner.example/exports/groups.jsonl
    legal_basis: AUTHORIZED_PARTNER
    feed_format: jsonl
    allowed_domain: telegram.partner.example
    text_fields: [message, caption, content_text]
    headers:
      Authorization: Bearer ${BLACKAGENT_TG_TOKEN}
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 12
