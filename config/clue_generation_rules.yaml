clue_generation_rules:
  clue_promotion:
    shared_contact_48h:
      match_clue_types: [shared_contact_48h, graph_shared_contact_cross_source]
      match_clue_type_contains: [contact, account, invite]
      require_any:
        - min_sources: 2
        - min_observations: 3
      actionability_bonus:
        sensitive_entity: 0.18
      pass_reason: contact_account_cross_source_or_three_observations
      fail_reason: contact_account_requires_two_sources_or_three_observations
    shared_domain_multi_source:
      match_clue_types: [shared_domain_multi_source, graph_shared_entity_cross_source]
      match_clue_type_contains: [domain, url]
      require_all:
        - min_sources: 2
        - any_entity_type: [contact, account, tool_name]
      pass_reason: domain_url_cross_source_with_contact_or_tool
      fail_reason: domain_url_requires_two_sources_and_contact_or_tool
    tool_slang:
      match_clue_types: [tool_slang, entity_graph_tool_trade_cluster]
      match_clue_type_contains: [tool, slang]
      require_any:
        - any_entity_type: [contact, account, price, url, domain, tool_name]
        - min_sources: 2
      pass_reason: tool_slang_has_transaction_or_cross_source_support
      fail_reason: tool_slang_requires_contact_price_url_or_cross_source_support
    high_frequency_template:
      match_clue_type_contains: [template]
      require_all:
        - min_observations: 3
      reject_risk_categories: [normal_noise, 正常业务白噪声]
      pass_reason: template_repeated_three_times_non_defensive
      fail_reason: template_requires_three_non_defensive_repetitions
  shared_contact_48h:
    min_observations: 3
    window_hours: 48
    promotion:
      require_min_sources: 2
      require_min_observations: 3
  shared_domain_multi_source:
    min_sources: 2
    promotion:
      require_any_entity: [contact, account, tool_name]
  high_frequency_template:
    min_records: 3
    promotion:
      reject_risk_categories: [normal_noise, 正常业务白噪声]
  tool_slang:
    promotion:
      require_any_entity: [contact, account, price, url, domain]
