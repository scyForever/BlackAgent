app:
  name: BlackAgent
  mode: llm_driven_investigation
  year: 2026
  environment: local

pipeline:
  confidence_threshold: 0.75
  max_input_chars: 4000
  default_legal_basis: PUBLIC_COMPLIANT_DATA

sandbox:
  max_rounds: 3
  max_tokens: 4096
  max_elapsed_ms: 25000

storage:
  backend: memory
  review_queue: memory
  entity_graph:
    enabled: true
    db_path: data/entity_graph.db
  # Use sqlite:///data/blackagent.db for local persistent backend or
  # postgresql://user:pass@host:5432/dbname when psycopg is installed.
  dsn: ${BLACKAGENT_STORAGE_DSN}
  auto_create_schema: true
  connect_timeout_seconds: 5

tasks:
  backend: local
  persist: true
  max_workers: 2

scheduler:
  enabled: false
  dsn: sqlite:///data/blackagent_scheduler.db
  bootstrap_on_start: false
  start_immediately: true
  worker_count: 3
  claim_limit_per_worker: 2
  max_claim_rounds: 6
  fast_interval_seconds: 60
  slow_interval_seconds: 600
  clue_build_interval_seconds: 180
  lease_seconds: 120
  retry_backoff_seconds: 45
  max_attempts: 3
  clue_batch_limit: 500
  cron_overrides: {}
  default_db_path: data/blackagent_scheduler.db

network:
  # Real HTTP(S) feed collection is opt-in. Keep false for local tests and
  # turn on only after legal basis, robots/terms, and rate limits are confirmed.
  enabled: false
  allowed_domains: []
  timeout_seconds: 15
  max_records_per_fetch: 100
  user_agent: BlackAgent-HTTPFeedCollector/0.1
  max_concurrent_sources: 2
  rate_limit_per_minute: 0
  retry_attempts: 2
  retry_backoff_seconds: 1.0
  retry_backoff_multiplier: 2.0
  retry_statuses: [429, 500, 502, 503, 504]

enforcement:
  # High-impact production actions stay dry-run unless explicitly enabled,
  # approved, confidence-gated, token-gated, and wired to a real connector.
  enabled: false
  dry_run: true
  require_human_approval: true
  min_confidence: 0.95
  max_actions_per_run: 50
  allowed_actions: [ban, block, blacklist, intercept]
  allowed_target_types: [account, domain, url, ip, phone, device, merchant, group]
  connector: audit
  webhook_url: ${BLACKAGENT_ENFORCEMENT_WEBHOOK_URL}
  webhook_token: ${BLACKAGENT_ENFORCEMENT_WEBHOOK_TOKEN}
  require_production_token: true
  production_safety_token: ${BLACKAGENT_PRODUCTION_SAFETY_TOKEN}

llm:
  provider: mock
  enabled: false
  base_url: ${BLACKAGENT_LLM_BASE_URL}
  api_key: ${BLACKAGENT_LLM_API_KEY}
  model: mock-local
  timeout_seconds: 60
  dry_run: true
  response_format_supported: true
  # auth_header: api-key
  # max_tokens_param: max_completion_tokens
  # extra_body:
  #   thinking:
  #     type: disabled

investigation:
  live_collection_enabled: true
  short_window_hours: 48
  balanced_min_pool_high_quality_count: 1
  high_precision_min_pool_high_quality_count: 2
  evidence_chain_min_pool_high_quality_count: 1
  min_cross_source_count: 2
  max_live_sources_when_pool_hit: 2
  retrieval_score_threshold_for_pool_merge: 0.0
  telemetry_enabled: true

labels:
  schema_path: config/label_schema.json

prompts:
  classifier: prompts/classifier_prompt_v1.yaml
  extractor: prompts/extractor_prompt_v1.yaml
  exploration: prompts/exploration_prompt_v1.yaml
