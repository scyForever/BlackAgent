entity_patterns:
  url:
    scope: basic
    entity_type: url
    patterns:
      - "(?:https?://[^\\s\\\"'<>，。；;,]+|(?:[a-z0-9-]+\\.)+(?:com|cn|net|org|top|xyz|io|cc|info|me|example)(?:/[^\\s\\\"'<>，。；;,]*)?)"
  email:
    scope: basic
    entity_type: contact
    patterns:
      - "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b"
  phone:
    scope: basic
    entity_type: contact
    patterns:
      - "(?<!\\d)(?:\\+?86[-\\s]?)?1[3-9]\\d{9}(?!\\d)"
  qq:
    scope: basic
    entity_type: contact
    patterns:
      - "(?:QQ|企鹅|🐧)[:：\\s]*([1-9]\\d{4,11})"
  wechat:
    scope: basic
    entity_type: contact
    patterns:
      - "(?:微信|VX|V\\s*X|V信|微(?:信)?|薇(?:信)?|围信|威信|wechat|wx)[:：\\s]*([a-zA-Z][-_a-zA-Z0-9]{5,19})"
  telegram_basic:
    scope: basic
    entity_type: contact
    patterns:
      - "(?:Telegram|TG|TG号|飞机|纸飞机|小飞机|电报|✈️?|🛩️?)[:：\\s@]*([a-zA-Z][a-zA-Z0-9_]{2,31})|(?<!\\w)@([A-Za-z][A-Za-z0-9_]{2,31})"
  account:
    scope: basic
    entity_type: account
    patterns:
      - "(?:账号|账户|UID|用户ID|群号|ID)[:：\\s#]*([A-Za-z0-9_-]{4,32})"
  tool_terms:
    scope: basic
    entity_type: tool_name
    terms:
      - 群控
      - 脚本
      - 外挂
      - 接码平台
      - 接码
      - 改机
      - 打粉工具
      - 自动化工具
      - 卡密
      - 跑分平台
  obfuscated_url:
    scope: advanced
    entity_type: url
    method: hidden_obfuscated_url
    patterns:
      - "(?:hxxps?|https?)[:：]//[^\\s，。；;,]+|[a-z0-9-]+\\s*\\[\\.\\]\\s*(?:com|cn|net|top|xyz|example)(?:/[^\\s，。；;,]*)?"
  invite_code:
    scope: advanced
    patterns:
      - "(?:邀请码|暗号|口令)[:：\\s]*(?:code[:：\\s]*)?([A-Za-z0-9_-]{3,24})"
      - "\\bcode[:：\\s]*([A-Za-z0-9_-]{3,24})"
    entity_type: account
    method: hidden_invite_code
  settlement:
    scope: advanced
    pattern: "(跑分|代付|虚拟币|USDT|银行卡|支付宝|微信收款)"
    entity_type: settlement
    method: hidden_settlement_term
  telegram:
    scope: advanced
    entity_type: contact
    normalized_prefix: telegram
    patterns:
      - "(?:Telegram|TG|飞机|纸飞机)[:：\\s@]*([a-zA-Z][a-zA-Z0-9_]{2,31})"
