# Focused authorized catalog for collection skew reduction reruns.
#
# Purpose: add non-IM/forum/vertical evidence without increasing Telegram-heavy
# raw skew.  These are public-compliant search/result pages accessed through the
# existing HTTP feed collector; no login, CAPTCHA bypass, or private-group access
# is encoded here.

sources:
  - source_name: opt_tieba_account_trade_search
    source_type: Social
    platform: tieba
    source_url: http://r.jina.ai/http://html.duckduckgo.com/html/?q=site%3Atieba.baidu.com%2Fp%20%E5%8D%96%E5%8F%B7%20%E8%B4%A6%E5%8F%B7
    query_url_template: http://r.jina.ai/http://html.duckduckgo.com/html/?q={query}
    query_seed_terms: ["site:tieba.baidu.com/p"]
    query_global_terms: ["卖号 账号交易", "实名号 收号", "接码 群控"]
    query_themes: [账号交易, 接码, 工具交易]
    query_term_limit: 3
    legal_basis: PUBLIC_COMPLIANT_DATA
    feed_format: html
    allowed_domain: r.jina.ai
    include_keywords: [卖号, 收号, 账号交易, 账号买卖, 实名号, 白号, 老号, 接码, 群控, 脚本, 协议号, 联系, 客服]
    include_themes: [账号交易, 接码, 工具交易]
    exclude_keywords: [警方通报, 反诈, 安全通告, 曝光, 辟谣, 普法, 教程, 指南, 攻略, 评测, 电子合同, 正规平台, 维权]
    min_keyword_hits: 1
    robots_allowed: true
    terms_allow_security_research: true
    rate_limit_per_minute: 3

