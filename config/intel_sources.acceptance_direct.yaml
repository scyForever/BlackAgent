# No-proxy source catalog for the multi-source acceptance pack.
# It avoids r.jina.ai and uses direct public HTTP endpoints only.
sources:
  - source_name: direct_public_article_search
    source_type: public_account
    platform: html_article
    source_url: https://www.bing.com/search?q=site%3Amp.weixin.qq.com%2Fs+%E6%8E%A5%E7%A0%81+%E7%BE%A4%E6%8E%A7
    query_url_template: https://www.bing.com/search?q={query}
    query_seed_terms: ["site:mp.weixin.qq.com/s"]
    query_global_terms: [接码, 群控, 私域导流, 刷单, 卖号, 反诈 黑灰产]
    query_themes: [接码, 账号交易, 诈骗引流, 刷单作弊, 众包任务]
    query_term_limit: 6
    legal_basis: PUBLIC_COMPLIANT_DATA
    feed_format: html
    allowed_domain: www.bing.com
    include_keywords: [接码, 群控, 私域, 导流, 刷单, 卖号, 账号, 黑灰产, 反诈, 电诈, 跑分, 引流, 拉新]
    include_themes: [接码, 账号交易, 诈骗引流, 刷单作弊, 众包任务]
    exclude_keywords: [游戏攻略, 影视, 小说, 美食]
    min_keyword_hits: 1
    source_quota_groups: [public_account_or_article]
    robots_allowed: true
    terms_allow_security_research: true

